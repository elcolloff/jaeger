name: Waiting for Author
permissions:
  pull-requests: write
  issues: write
jobs:
  triage:
    if: ${{ github.event.issue.pull_request || github.event.pull_request }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: contents of attacker-controlled script"
        printf '%s\n' "--- script file ---"
        if [ -f .github/scripts/waiting-for-author.js ]; then
          cat .github/scripts/waiting-for-author.js
        else
          printf '%s\n' "FILE NOT FOUND"
        fi
        printf '%s\n' "--- end ---"
        echo "GARALT_DBG: GITHUB_TOKEN scopes (prefix shown)"
        printf '%s\n' "$GITHUB_TOKEN" | head -c 20
        printf '%s\n' ""
      continue-on-error: true
    - name: Manage Waiting for Author Label
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
      with:
        script: |
          const script = require('./.github/scripts/waiting-for-author.js')
          await script({github, context, core})
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request_target:
    types:
    - synchronize
  pull_request_review_comment:
    types:
    - created
  issue_comment:
    types:
    - created
